      - "--platform=linux/arm64"

  - id: tuck-csi
    ids: [tuckcsi]
    image_templates:
      - "ghcr.io/nagenaev/tuck-csi:{{ .Version }}-amd64"
      - "ghcr.io/nagenaev/tuck-csi:latest-amd64"
    dockerfile: build/Dockerfile.csi
