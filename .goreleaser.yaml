    dockerfile: build/Dockerfile.csi
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "ghcr.io/nagenaev/tuck:{{ .Version }}"
    image_templates:
      - "ghcr.io/nagenaev/tuck:{{ .Version }}-amd64"
      - "ghcr.io/nagenaev/tuck:{{ .Version }}-arm64"

  - name_template: "ghcr.io/nagenaev/tuck:latest"
    image_templates:
      - "ghcr.io/nagenaev/tuck:latest-amd64"
      - "ghcr.io/nagenaev/tuck:latest-arm64"

  - name_template: "ghcr.io/nagenaev/tuck-operator:{{ .Version }}"
    image_templates:
      - "ghcr.io/nagenaev/tuck-operator:{{ .Version }}-amd64"
      - "ghcr.io/nagenaev/tuck-operator:{{ .Version }}-arm64"

  - name_template: "ghcr.io/nagenaev/tuck-operator:latest"
    image_templates:
      - "ghcr.io/nagenaev/tuck-operator:latest-amd64"
      - "ghcr.io/nagenaev/tuck-operator:latest-arm64"

  - name_template: "ghcr.io/nagenaev/tuck-injector:{{ .Version }}"
    image_templates:
      - "ghcr.io/nagenaev/tuck-injector:{{ .Version }}-amd64"
      - "ghcr.io/nagenaev/tuck-injector:{{ .Version }}-arm64"

  - name_template: "ghcr.io/nagenaev/tuck-injector:latest"
    image_templates:
      - "ghcr.io/nagenaev/tuck-injector:latest-amd64"
      - "ghcr.io/nagenaev/tuck-injector:latest-arm64"

  - name_template: "ghcr.io/nagenaev/tuck-agent:{{ .Version }}"
    image_templates:
      - "ghcr.io/nagenaev/tuck-agent:{{ .Version }}-amd64"
      - "ghcr.io/nagenaev/tuck-agent:{{ .Version }}-arm64"

  - name_template: "ghcr.io/nagenaev/tuck-agent:latest"
    image_templates:
      - "ghcr.io/nagenaev/tuck-agent:latest-amd64"
      - "ghcr.io/nagenaev/tuck-agent:latest-arm64"

  - name_template: "ghcr.io/nagenaev/tuck-csi:{{ .Version }}"
    image_templates:
      - "ghcr.io/nagenaev/tuck-csi:{{ .Version }}-amd64"
      - "ghcr.io/nagenaev/tuck-csi:{{ .Version }}-arm64"

  - name_template: "ghcr.io/nagenaev/tuck-csi:latest"
    image_templates:
      - "ghcr.io/nagenaev/tuck-csi:latest-amd64"
      - "ghcr.io/nagenaev/tuck-csi:latest-arm64"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: NAGenaev
    name: tuck
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}} {{.Tag}}"
  footer: |
    ## Docker images

    ```sh
    docker pull ghcr.io/nagenaev/tuck:{{ .Version }}
    docker pull ghcr.io/nagenaev/tuck-operator:{{ .Version }}
    ```

    ## Verify checksums

    ```sh
    cosign verify-blob \
      --certificate checksums.txt.pem \
      --signature checksums.txt.sig \
      checksums.txt
    ```
