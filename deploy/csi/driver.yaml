# Tuck CSI Node Driver — deploys tuckcsi as a DaemonSet.
#
# Prerequisites:
#   - Tuck server running and reachable from nodes
#   - A Kubernetes Secret per namespace with key "token" containing a Tuck token
#
# Usage:
#   kubectl apply -f deploy/csi/driver.yaml
#
# Then reference the driver in your Pod spec:
#
#   volumes:
#   - name: tuck-secrets
#     csi:
#       driver: secrets.tuck.io
#       readOnly: true
#       nodePublishSecretRef:
#         name: tuck-token-secret   # Secret with key "token"
#       volumeAttributes:
#         tuck.io/addr: "https://tuck.tuck-system:8200"
#         tuck.io/paths: "db/password,api/key"
---
apiVersion: storage.k8s.io/v1
kind: CSIDriver
metadata:
  name: secrets.tuck.io
spec:
  attachRequired: false
  podInfoOnMount: false
  volumeLifecycleModes:
  - Ephemeral
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tuckcsi
  namespace: tuck-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tuckcsi
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tuckcsi
subjects:
- kind: ServiceAccount
  name: tuckcsi
  namespace: tuck-system
roleRef:
  kind: ClusterRole
  name: tuckcsi
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: tuckcsi
  namespace: tuck-system
  labels:
    app: tuckcsi
spec:
  selector:
    matchLabels:
      app: tuckcsi
  template:
    metadata:
      labels:
        app: tuckcsi
    spec:
      serviceAccountName: tuckcsi
      priorityClassName: system-node-critical
      containers:
      - name: tuckcsi
        image: ghcr.io/nagenaev/tuckcsi:latest
        imagePullPolicy: IfNotPresent
        args:
        - --endpoint=unix:///csi/csi.sock
        - --node-id=$(NODE_NAME)
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        securityContext:
          privileged: true          # required for mount(2) syscall
          allowPrivilegeEscalation: true
        volumeMounts:
        - name: plugin-dir
          mountPath: /csi
        - name: pods-mount-dir
          mountPath: /var/lib/kubelet/pods
          mountPropagation: Bidirectional
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
      - name: driver-registrar
        image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.9.0
        args:
        - --csi-address=/csi/csi.sock
        - --kubelet-registration-path=/var/lib/kubelet/plugins/secrets.tuck.io/csi.sock
        volumeMounts:
        - name: plugin-dir
          mountPath: /csi
        - name: registration-dir
          mountPath: /registration
      volumes:
      - name: plugin-dir
        hostPath:
          path: /var/lib/kubelet/plugins/secrets.tuck.io
          type: DirectoryOrCreate
      - name: pods-mount-dir
        hostPath:
          path: /var/lib/kubelet/pods
          type: Directory
      - name: registration-dir
        hostPath:
          path: /var/lib/kubelet/plugins_registry
          type: Directory
