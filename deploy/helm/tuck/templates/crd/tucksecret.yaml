{{- if .Values.crds.install }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tucksecrets.tuck.io
  labels:
    {{- include "tuck.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep   # do not delete CRD on helm uninstall
spec:
  group: tuck.io
  scope: Namespaced
  names:
    plural: tucksecrets
    singular: tucksecret
    kind: TuckSecret
    listKind: TuckSecretList
    shortNames:
      - ts
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [tuckPath, secretName, secretKey]
              properties:
                tuckPath:
                  type: string
                secretName:
                  type: string
                secretKey:
                  type: string
                tuckServer:
                  type: string
                refreshInterval:
                  type: string
                deletionPolicy:
                  type: string
                  enum: ["Retain", "Delete"]
                  default: Retain
            status:
              type: object
              properties:
                lastSyncTime:
                  type: string
                  format: date-time
                lastSyncError:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Synced
          type: string
          jsonPath: .status.conditions[?(@.type=="Synced")].status
        - name: TuckPath
          type: string
          jsonPath: .spec.tuckPath
        - name: SecretName
          type: string
          jsonPath: .spec.secretName
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
{{- end }}
