{{- if .Values.csi.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "tuck.fullname" . }}-csi
  namespace: {{ include "tuck.namespace" . }}
  labels:
    {{- include "tuck.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "tuck.fullname" . }}-csi
  labels:
    {{- include "tuck.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "tuck.fullname" . }}-csi
  labels:
    {{- include "tuck.labels" . | nindent 4 }}
    app.kubernetes.io/component: csi
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "tuck.fullname" . }}-csi
subjects:
  - kind: ServiceAccount
    name: {{ include "tuck.fullname" . }}-csi
    namespace: {{ include "tuck.namespace" . }}
{{- end }}
