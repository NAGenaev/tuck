apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tuck-server
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tuck-server
subjects:
  - kind: ServiceAccount
    name: tuck-server
    namespace: tuck
roleRef:
  kind: ClusterRole
  name: tuck-server
  apiGroup: rbac.authorization.k8s.io
