<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuck — Secrets Manager</title>
<style>
:root {
  --sidebar-bg: #1a1f36;
  --sidebar-fg: #8792b0;
  --sidebar-active: #fff;
  --sidebar-accent: #635bff;
  --bg: #f6f9fc;
  --card: #fff;
  --border: #e3e8ee;
  --text: #1a1f36;
  --muted: #697386;
  --success: #09825d;
  --success-bg: #cbf4c9;
  --danger: #9e2146;
  --danger-bg: #fde8ec;
  --warning: #7a4f01;
  --warning-bg: #fcefc7;
  --primary: #635bff;
  --primary-hover: #4f47e0;
  --radius: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
a { color: var(--primary); text-decoration: none; }
input, textarea, select { font: inherit; }

/* Layout */
#app { display: flex; min-height: 100vh; }
#app.login-mode { align-items: center; justify-content: center; background: var(--sidebar-bg); }

/* Sidebar */
#sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--sidebar-bg); color: var(--sidebar-fg);
  display: flex; flex-direction: column;
  padding: 0; min-height: 100vh;
}
.sidebar-logo {
  padding: 20px 20px 16px;
  font-size: 18px; font-weight: 700;
  color: #fff; letter-spacing: -.3px;
  border-bottom: 1px solid rgba(255,255,255,.07);
  display: flex; align-items: center; gap: 8px;
}
.sidebar-logo svg { flex-shrink: 0; }
.seal-badge {
  display: inline-block; padding: 1px 7px;
  border-radius: 12px; font-size: 10px; font-weight: 600;
  margin-left: auto;
}
.seal-badge.unsealed { background: var(--success-bg); color: var(--success); }
.seal-badge.sealed   { background: var(--danger-bg); color: var(--danger); }
.seal-badge.unknown  { background: var(--warning-bg); color: var(--warning); }

nav { padding: 8px 0; flex: 1; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px; cursor: pointer;
  color: var(--sidebar-fg); font-size: 13px;
  border-left: 3px solid transparent;
  transition: color .15s, background .15s;
}
.nav-item:hover { color: #c9d1e8; background: rgba(255,255,255,.05); }
.nav-item.active { color: var(--sidebar-active); background: rgba(255,255,255,.07); border-left-color: var(--sidebar-accent); }
.nav-icon { width: 16px; text-align: center; opacity: .7; }

.sidebar-footer { padding: 14px 20px; border-top: 1px solid rgba(255,255,255,.07); }
.logout-btn {
  width: 100%; padding: 7px; border-radius: var(--radius);
  background: rgba(255,255,255,.07); border: none; color: var(--sidebar-fg);
  cursor: pointer; font-size: 12px; transition: background .15s;
}
.logout-btn:hover { background: rgba(255,255,255,.12); color: #fff; }

/* Main */
#main { flex: 1; display: flex; flex-direction: column; overflow: auto; }
.page-header {
  padding: 20px 28px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--card);
}
.page-header h1 { font-size: 18px; font-weight: 600; }
.page-header p  { color: var(--muted); font-size: 12px; margin-top: 2px; }
.page-body { padding: 24px 28px; }

/* Cards */
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 16px; }
.card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); font-weight: 600; display: flex; align-items: center; justify-content: space-between; }
.card-body { padding: 18px; }
.card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* Status */
.status-big { display: flex; align-items: center; gap: 12px; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.status-dot.green { background: #1cb87e; box-shadow: 0 0 0 3px #cbf4c9; }
.status-dot.red   { background: #e56f84; box-shadow: 0 0 0 3px #fde8ec; }
.status-label { font-size: 16px; font-weight: 600; }
.kv-grid { display: grid; grid-template-columns: 90px 1fr; gap: 4px 10px; font-size: 12px; }
.kv-grid dt { color: var(--muted); }
.kv-grid dd { font-family: monospace; word-break: break-all; }

/* Forms */
.form-row { margin-bottom: 12px; }
.form-row label { display: block; font-size: 12px; font-weight: 500; margin-bottom: 4px; color: var(--muted); }
.form-row input, .form-row textarea, .form-row select {
  width: 100%; padding: 7px 10px;
  border: 1px solid var(--border); border-radius: var(--radius);
  background: #fff; outline: none; transition: border-color .15s;
}
.form-row input:focus, .form-row textarea:focus { border-color: var(--primary); }
.form-row textarea { min-height: 80px; resize: vertical; font-family: monospace; font-size: 12px; }
.form-actions { display: flex; gap: 8px; margin-top: 16px; }

/* Buttons */
.btn {
  padding: 7px 14px; border-radius: var(--radius); border: none;
  font-size: 13px; font-weight: 500; cursor: pointer; transition: background .15s, opacity .15s;
}
.btn:disabled { opacity: .5; cursor: default; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
.btn-danger  { background: var(--danger-bg); color: var(--danger); }
.btn-danger:hover:not(:disabled) { background: #fbd0d9; }
.btn-ghost   { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-ghost:hover:not(:disabled) { background: var(--bg); }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* Table */
.table { width: 100%; border-collapse: collapse; font-size: 12px; }
.table th { padding: 8px 12px; text-align: left; color: var(--muted); font-weight: 500; border-bottom: 2px solid var(--border); }
.table td { padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.table tr:last-child td { border-bottom: none; }
.table tr:hover td { background: var(--bg); }
.mono { font-family: monospace; font-size: 11px; word-break: break-all; }

/* Alerts */
.alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 14px; }
.alert-error   { background: var(--danger-bg); color: var(--danger); }
.alert-success { background: var(--success-bg); color: var(--success); }
.alert-info    { background: #e8f4fd; color: #0c5c8a; }

/* Login */
.login-card {
  width: 360px; background: var(--card); border-radius: 10px;
  padding: 36px; box-shadow: 0 4px 24px rgba(0,0,0,.3);
}
.login-card h1 { font-size: 22px; text-align: center; margin-bottom: 6px; }
.login-card p  { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 24px; }

/* Spinner */
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Tag */
.tag { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 11px; background: #eee; color: var(--muted); margin: 1px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─────────── State ───────────
const S = {
  token:     sessionStorage.getItem('tuck_token') || '',
  page:      'status',
  sealed:    null,   // null = unknown
  sealType:  '',
  pollTimer: null,
  msg:       null,   // {type:'success'|'error', text}
  authTab:   'approle',
  dynamicTab: 'db',
  cryptoTab:  'pki',
};

// ─────────── API ───────────
async function api(method, path, body) {
  const headers = {};
  if (S.token) headers['X-Tuck-Token'] = S.token;
  const opts = { method, headers };
  if (body !== undefined) {
    headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(path, opts);
  let d;
  try { d = await r.json(); } catch { d = {}; }
  if (r.status === 401) { logout(); return null; }
  if (!r.ok) throw new Error(d.error || `HTTP ${r.status}`);
  return d;
}

async function apiRaw(method, path, body) {
  const headers = {};
  if (S.token) headers['X-Tuck-Token'] = S.token;
  const opts = { method, headers };
  if (body !== undefined) opts.body = body;
  const r = await fetch(path, opts);
  if (r.status === 401) { logout(); return null; }
  return r;
}

// ─────────── Helpers ───────────
function logout() {
  sessionStorage.removeItem('tuck_token');
  S.token = ''; S.sealed = null;
  stopPoll(); render();
}

function setPage(p) { S.page = p; S.msg = null; render(); }
function flash(type, text) { S.msg = {type, text}; render(); }

function stopPoll() { if (S.pollTimer) { clearInterval(S.pollTimer); S.pollTimer = null; } }

async function refreshSeal() {
  try {
    const d = await api('GET', '/v1/sys/seal-status');
    if (!d) return;
    S.sealed = d.sealed;
    S.sealType = d.type || '';
    S.sealRequired = d.required_shards;
    S.sealReceived = d.received_shards;
    // update badge without full re-render
    document.querySelectorAll('.seal-badge').forEach(el => {
      el.className = 'seal-badge ' + (S.sealed ? 'sealed' : 'unsealed');
      el.textContent = S.sealed ? 'SEALED' : 'OPEN';
    });
  } catch (_) {}
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────── Render ───────────
function render() {
  const root = document.getElementById('app');
  if (!S.token) {
    root.className = 'login-mode';
    root.innerHTML = renderLogin();
  } else {
    root.className = '';
    root.innerHTML = renderApp();
  }
  bind();
}

function badgeClass() { return S.sealed === null ? 'unknown' : S.sealed ? 'sealed' : 'unsealed'; }
function badgeText()  { return S.sealed === null ? '…' : S.sealed ? 'SEALED' : 'OPEN'; }

function renderLogin() {
  return `
<div class="login-card">
  <h1>🔐 Tuck</h1>
  <p>Enter your root or service token to continue.</p>
  ${S.msg ? `<div class="alert alert-${S.msg.type}">${esc(S.msg.text)}</div>` : ''}
  <form id="login-form">
    <div class="form-row">
      <label>Token</label>
      <input type="password" id="token-input" placeholder="tuck_…" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" style="width:100%" type="submit">Sign In</button>
  </form>
</div>`;
}

function renderApp() {
  return `
<div id="sidebar">
  <div class="sidebar-logo">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <rect width="20" height="20" rx="5" fill="#635bff"/>
      <path d="M6 8.5V7a4 4 0 0 1 8 0v1.5" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
      <rect x="4" y="9" width="12" height="8" rx="2" fill="#fff"/>
      <circle cx="10" cy="13" r="1.5" fill="#635bff"/>
    </svg>
    Tuck
    <span class="seal-badge ${badgeClass()}">${badgeText()}</span>
  </div>
  <nav>
    ${navItem('status', '⬡', 'Status')}
    ${navItem('secrets', '🗝', 'Secrets')}
    ${navItem('kvv2', '📚', 'KV v2')}
    ${navItem('tokens', '🎟', 'Tokens')}
    ${navItem('policies', '📋', 'Policies')}
    ${navItem('auth', '🔑', 'Auth Methods')}
    ${navItem('dynamic', '⚡', 'Dynamic Secrets')}
    ${navItem('crypto', '🔐', 'Crypto Engines')}
    ${navItem('wrapping', '📦', 'Wrapping')}
    ${navItem('namespaces', '🏢', 'Namespaces')}
    ${navItem('token-roles', '🎭', 'Token Roles')}
    ${navItem('audit', '📜', 'Audit Sinks')}
    ${navItem('cluster', '🖧', 'Cluster')}
    ${navItem('mounts', '🗂', 'Mounts')}
    ${navItem('plugins', '🔌', 'Plugins')}
    ${navItem('replication', '🔄', 'Replication')}
  </nav>
  <div class="sidebar-footer">
    <button class="logout-btn" id="logout-btn">Sign out</button>
  </div>
</div>
<div id="main">
  ${S.msg ? `<div style="padding:12px 28px 0"><div class="alert alert-${S.msg.type}">${esc(S.msg.text)}</div></div>` : ''}
  ${renderPage()}
</div>`;
}

function navItem(page, icon, label) {
  return `<div class="nav-item${S.page===page?' active':''}" data-page="${page}">
    <span class="nav-icon">${icon}</span>${label}
  </div>`;
}

function renderPage() {
  switch (S.page) {
    case 'status':   return pageStatus();
    case 'secrets':  return pageSecrets();
    case 'kvv2':     return pageKVv2();
    case 'tokens':   return pageTokens();
    case 'policies': return pagePolicies();
    case 'auth':     return pageAuth();
    case 'dynamic':  return pageDynamic();
    case 'crypto':   return pageCrypto();
    case 'wrapping':    return pageWrapping();
    case 'namespaces':  return pageNamespaces();
    case 'token-roles': return pageTokenRoles();
    case 'audit':       return pageAuditSinks();
    case 'cluster':     return pageCluster();
    case 'mounts':      return pageMounts();
    case 'plugins':     return pagePlugins();
    case 'replication': return pageReplication();
    default: return '';
  }
}

// ─────────── Status page ───────────
function pageStatus() {
  const sealed = S.sealed;
  const dot = sealed === null ? '' : sealed ? 'red' : 'green';
  const label = sealed === null ? 'Loading…' : sealed ? 'Sealed' : 'Unsealed';
  return `
<div class="page-header">
  <h1>System Status</h1>
  <p>Seal state and maintenance operations</p>
</div>
<div class="page-body">
  <div class="card-grid">
    <div class="card">
      <div class="card-header">Seal Status</div>
      <div class="card-body">
        <div class="status-big" style="margin-bottom:14px">
          <span class="status-dot ${dot}"></span>
          <span class="status-label">${label}</span>
        </div>
        <dl class="kv-grid">
          <dt>Seal type</dt><dd>${esc(S.sealType || '–')}</dd>
          ${S.sealRequired ? `<dt>Shards</dt><dd>${S.sealReceived||0} / ${S.sealRequired} required</dd>` : ''}
        </dl>
      </div>
    </div>
    ${sealed ? `
    <div class="card">
      <div class="card-header">Unseal</div>
      <div class="card-body">
        <form id="unseal-form">
          <div class="form-row">
            <label>Shamir shard (base64url)</label>
            <textarea name="key" placeholder="Paste one key shard…" style="min-height:60px"></textarea>
          </div>
          <button class="btn btn-primary" type="submit">Submit Shard</button>
        </form>
      </div>
    </div>` : `
    <div class="card">
      <div class="card-header">Actions</div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-ghost" id="rotate-btn">🔄 Rotate Key</button>
        <button class="btn btn-danger" id="seal-btn">🔒 Seal Server</button>
      </div>
    </div>`}
  </div>
</div>`;
}

// ─────────── Secrets page ───────────
function pageSecrets() {
  return `
<div class="page-header">
  <h1>KV Secrets</h1>
  <p>Browse, read, and manage key-value secrets</p>
</div>
<div class="page-body">
  <div class="card">
    <div class="card-header">List</div>
    <div class="card-body">
      <form id="list-form" style="display:flex;gap:8px;margin-bottom:14px">
        <input name="prefix" placeholder="Prefix (leave blank for all)" style="flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius)">
        <button class="btn btn-primary" type="submit">List</button>
      </form>
      <div id="secret-list"></div>
    </div>
  </div>
  <div class="card-grid">
    <div class="card">
      <div class="card-header">Get Secret</div>
      <div class="card-body">
        <form id="get-form">
          <div class="form-row"><label>Path</label><input name="path" placeholder="db/password"></div>
          <button class="btn btn-primary" type="submit">Get</button>
        </form>
        <div id="get-result" style="margin-top:12px"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">Put Secret</div>
      <div class="card-body">
        <form id="put-form">
          <div class="form-row"><label>Path</label><input name="path" placeholder="db/password"></div>
          <div class="form-row"><label>Value</label><textarea name="value" placeholder="secret value"></textarea></div>
          <div class="form-row"><label>TTL (optional, e.g. 24h)</label><input name="ttl" placeholder=""></div>
          <div class="form-row"><label>Metadata JSON (optional, e.g. {"env":"prod"})</label><input name="metadata" placeholder=""></div>
          <button class="btn btn-primary" type="submit">Save</button>
        </form>
      </div>
    </div>
  </div>
</div>`;
}

// ─────────── KV v2 page ───────────
function pageKVv2() {
  return `
<div class="page-header">
  <h1>KV v2 — Versioned Secrets</h1>
  <p>Write, read, and manage versioned key-value secrets</p>
</div>
<div class="page-body">
  <div class="card">
    <div class="card-header">List</div>
    <div class="card-body">
      <form id="v2-list-form" style="display:flex;gap:8px;margin-bottom:14px">
        <input name="prefix" placeholder="Prefix (leave blank for all)" style="flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius)">
        <button class="btn btn-primary" type="submit">List</button>
      </form>
      <div id="v2-list-result"></div>
    </div>
  </div>
  <div class="card-grid">
    <div class="card">
      <div class="card-header">Write Secret</div>
      <div class="card-body">
        <form id="v2-write-form">
          <div class="form-row"><label>Path</label><input name="path" placeholder="db/password"></div>
          <div class="form-row"><label>Value</label><textarea name="value" placeholder="secret value"></textarea></div>
          <div class="form-row"><label>CAS (optional)</label><input name="cas" placeholder="expected version, e.g. 0"></div>
          <button class="btn btn-primary" type="submit">Write</button>
        </form>
        <div id="v2-write-result" style="margin-top:10px"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">Read Secret</div>
      <div class="card-body">
        <form id="v2-read-form">
          <div class="form-row"><label>Path</label><input name="path" placeholder="db/password"></div>
          <div class="form-row"><label>Version (0 = current)</label><input name="version" placeholder="0" value="0"></div>
          <button class="btn btn-primary" type="submit">Read</button>
        </form>
        <div id="v2-read-result" style="margin-top:10px"></div>
      </div>
    </div>
  </div>
  <div class="card-grid">
    <div class="card">
      <div class="card-header">Metadata</div>
      <div class="card-body">
        <form id="v2-meta-form">
          <div class="form-row"><label>Path</label><input name="path" placeholder="db/password"></div>
          <button class="btn btn-primary" type="submit">Get Metadata</button>
        </form>
        <div id="v2-meta-result" style="margin-top:10px"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">Delete / Destroy</div>
      <div class="card-body">
        <form id="v2-delete-form">
          <div class="form-row"><label>Path</label><input name="path" placeholder="db/password"></div>
          <div class="form-row"><label>Versions (comma-separated, blank = current)</label><input name="versions" placeholder="1,2,3"></div>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="btn btn-ghost" type="submit" name="action" value="soft">Soft Delete</button>
            <button class="btn btn-ghost" type="submit" name="action" value="undelete">Undelete</button>
            <button class="btn btn-danger" type="submit" name="action" value="destroy">Destroy</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>`;
}

// ─────────── Response Wrapping page ───────────
function pageWrapping() {
  return `
<div class="page-header">
  <h1>Response Wrapping</h1>
  <p>Wrap a secret payload into a single-use token for secure delivery</p>
</div>
<div class="page-body">
  <div class="card-grid">
    <div class="card">
      <div class="card-header">Wrap Payload</div>
      <div class="card-body">
        <form id="wrap-form">
          <div class="form-row"><label>Payload (JSON)</label><textarea name="payload" placeholder='{"password":"s3cr3t"}'></textarea></div>
          <button class="btn btn-primary" type="submit">Wrap</button>
        </form>
        <div id="wrap-result" style="margin-top:12px"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">Unwrap / Lookup</div>
      <div class="card-body">
        <form id="unwrap-form">
          <div class="form-row"><label>Wrapping Token</label><input name="token" placeholder="tuck_wrap_..."></div>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="btn btn-primary" type="submit" name="action" value="unwrap">Unwrap</button>
            <button class="btn btn-ghost" type="submit" name="action" value="lookup">Lookup</button>
            <button class="btn btn-danger" type="submit" name="action" value="revoke">Revoke</button>
          </div>
        </form>
        <div id="unwrap-result" style="margin-top:12px"></div>
      </div>
    </div>
  </div>
</div>`;
}

// ─────────── Namespaces page ───────────
function pageNamespaces() {
  return `
<div class="page-header">
  <h1>Namespaces</h1>
  <p>Multi-tenant isolation — each namespace has its own secrets, policies and tokens</p>
</div>
<div class="page-body">
  <div class="card" style="margin-bottom:20px">
    <div class="card-header" style="display:flex;justify-content:space-between;align-items:center">
      Namespace List
      <button class="btn btn-ghost btn-sm" id="ns-refresh-btn">Refresh</button>
    </div>
    <div class="card-body">
      <div id="ns-list"><em style="color:var(--muted)">Click Refresh to load namespaces.</em></div>
    </div>
  </div>
  <div class="card-grid">
    <div class="card">

// ─────────── Bind events ───────────
function bind() {
  on('click', '#logout-btn', logout);
  on('click', '[data-page]', e => setPage(e.currentTarget.dataset.page));

  // Login
  onSubmit('#login-form', async fd => {
    const t = fd.get('token-input') || document.getElementById('token-input')?.value;
    if (!t) return;
    // Validate by fetching seal-status
    try {
      const r = await fetch('/v1/sys/seal-status', { headers: { 'X-Tuck-Token': t } });
      if (!r.ok && r.status === 401) { flash('error', 'Invalid token'); return; }
      S.token = t.trim();
      sessionStorage.setItem('tuck_token', S.token);
      S.msg = null;
      render();
      startPoll();
    } catch (e) { flash('error', e.message); }
  });

  // Status page actions
  onSubmit('#unseal-form', async fd => {
    try {
      const d = await api('POST', '/v1/sys/unseal', { key: fd.get('key').trim() });
      flash(d.sealed ? 'info' : 'success', d.message || (d.sealed ? `Shard accepted (${d.received_shards}/${d.required_shards})` : 'Unsealed successfully'));
      await refreshSeal();
      setPage('status');
    } catch (e) { flash('error', e.message); }
  });

  on('click', '#seal-btn', async () => {
    if (!confirm('Re-seal the server? All in-flight requests will return 503.')) return;
    try { await api('POST', '/v1/sys/seal'); flash('success', 'Server sealed'); await refreshSeal(); render(); }
    catch (e) { flash('error', e.message); }
  });

  on('click', '#rotate-btn', async () => {
    if (!confirm('Rotate the root key? For Shamir seals the new shares will be shown here.')) return;
    try {
      const d = await api('POST', '/v1/sys/rotate');
      if (d.shares?.length) {
        flash('success', 'Key rotated. New shares: ' + d.shares.join(' | '));
      } else {
        flash('success', 'Root key rotated successfully.');
      }
      render();
    } catch (e) { flash('error', e.message); }
  });

  // Secrets
  onSubmit('#list-form', async fd => {
    const prefix = fd.get('prefix').trim();
    try {
      const r = await fetch(`/v1/secret/${prefix}`, {
        method: 'LIST',
        headers: S.token ? { 'X-Tuck-Token': S.token } : {},
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || r.status);
      const el = document.getElementById('secret-list');
      if (!d.keys?.length) { el.innerHTML = '<em style="color:var(--muted)">No secrets found.</em>'; return; }
      el.innerHTML = `<table class="table">
        <thead><tr><th>Path</th><th></th></tr></thead>
        <tbody>${d.keys.map(k => `<tr>
          <td class="mono">${esc(k)}</td>
          <td style="width:80px">
            <button class="btn btn-ghost btn-sm" data-get="${esc(k)}">Get</button>
            <button class="btn btn-danger btn-sm" data-del="${esc(k)}" style="margin-left:4px">Del</button>
          </td>
        </tr>`).join('')}</tbody>
      </table>`;
      el.querySelectorAll('[data-get]').forEach(b => b.onclick = () => {
        document.querySelector('#get-form input[name=path]').value = b.dataset.get;
        document.getElementById('get-form').dispatchEvent(new Event('submit'));
      });
      el.querySelectorAll('[data-del]').forEach(b => b.onclick = () => deleteSecret(b.dataset.del));
    } catch (e) { flash('error', e.message); }
  });

  onSubmit('#get-form', async fd => {
    const path = fd.get('path').trim();
    if (!path) return;
    try {
      const d = await api('GET', `/v1/secret/${path}`);
      const res = document.getElementById('get-result');
      const v = d.encoding === 'base64' ? `[base64] ${d.value}` : d.value;
      const meta = d.metadata && Object.keys(d.metadata).length
        ? Object.entries(d.metadata).map(([k,val])=>`<dt>${esc(k)}</dt><dd>${esc(val)}</dd>`).join('')
        : '<dd style="color:var(--muted)">none</dd>';
      res.innerHTML = `<div class="card-body">
        <dl class="kv-grid">
          <dt>Value</dt><dd class="mono">${esc(v)}</dd>
          <dt>Created</dt><dd>${d.created_at ? new Date(d.created_at).toLocaleString() : '–'}</dd>
          <dt>Expires</dt><dd>${d.expires_at ? new Date(d.expires_at).toLocaleString() : '–'}</dd>
          <dt>Metadata</dt>${meta}
        </dl>
      </div>`;
    } catch (e) {
      document.getElementById('get-result').innerHTML = `<div class="alert alert-error">${esc(e.message)}</div>`;
    }
  });

  onSubmit('#put-form', async fd => {
    const path = fd.get('path').trim();
    const value = fd.get('value');
    const ttl = fd.get('ttl').trim();
    const metaRaw = fd.get('metadata').trim();
    if (!path) return;
    try {
      const body = { value };
      if (ttl) body.ttl = ttl;
      if (metaRaw) {
        try { body.metadata = JSON.parse(metaRaw); } catch { flash('error', 'Invalid metadata JSON'); return; }
      }
      await api('PUT', `/v1/secret/${path}`, body);
      flash('success', `Secret "${path}" saved.`); render();
    } catch (e) { flash('error', e.message); }
  });

  // Tokens
  on('click', '#list-tokens-btn', loadTokens);

  onSubmit('#create-token-form', async fd => {
    const policies = (fd.get('policies')||'').split(',').map(s=>s.trim()).filter(Boolean);
    const body = { display_name: fd.get('name'), policies };
    if (fd.get('ttl')) body.ttl = fd.get('ttl').trim();
    try {
      const d = await api('POST', '/v1/auth/token', body);
      document.getElementById('new-token-result').innerHTML =
        `<div class="alert alert-success">
          <strong>Token created (shown once):</strong><br>
          <span class="mono">${esc(d.id)}</span>
        </div>`;
    } catch (e) { flash('error', e.message); }
  });

  // Policies
  on('click', '#list-policies-btn', loadPolicies);
  on('click', '[data-auth-tab]',    e => { S.authTab   = e.currentTarget.dataset.authTab;   render(); });
  on('click', '[data-dyn-tab]',     e => { S.dynamicTab = e.currentTarget.dataset.dynTab;   render(); });
  on('click', '[data-crypto-tab]',  e => { S.cryptoTab  = e.currentTarget.dataset.cryptoTab; render(); });
  bindAuth();
  bindCrypto();
  bindKVv2();
  bindWrapping();
  bindNamespaces();
  bindTokenRoles();
  bindAuditSinks();
  bindCluster();
  bindMounts();
  bindPlugins();
  bindReplication();

  onSubmit('#create-policy-form', async fd => {
    const name = fd.get('name').trim();
    if (!name) return;
    let rules;
    try { rules = JSON.parse(fd.get('rules')); } catch { flash('error', 'Invalid JSON rules'); return; }
    try {
      await api('PUT', `/v1/policy/${name}`, { rules });
      flash('success', `Policy "${name}" saved.`); render();
    } catch (e) { flash('error', e.message); }
  });
}

async function deleteSecret(path) {
  if (!confirm(`Delete secret "${path}"?`)) return;
  try {
    const r = await fetch(`/v1/secret/${path}`, {
      method: 'DELETE',
      headers: { 'X-Tuck-Token': S.token },
    });
    if (!r.ok) { const d = await r.json(); throw new Error(d.error || r.status); }
    flash('success', `Secret "${path}" deleted.`); render();
  } catch (e) { flash('error', e.message); }
}

async function loadTokens() {
  try {
    const r = await fetch('/v1/auth/token/', {
      method: 'LIST',
      headers: { 'X-Tuck-Token': S.token },
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || r.status);
    const el = document.getElementById('token-list');
    if (!d.keys?.length) { el.innerHTML = '<em style="color:var(--muted)">No tokens.</em>'; return; }
    el.innerHTML = `<table class="table">
      <thead><tr><th>ID</th><th>Name</th><th>Policies</th><th>Expires</th><th></th></tr></thead>
      <tbody>${await Promise.all(d.keys.map(async id => {
        try {
          const t = await api('GET', `/v1/auth/token/${id}`);
          const exp = t.expires_at ? new Date(t.expires_at).toLocaleString() : 'never';
          const pols = (t.policies||[]).map(p=>`<span class="tag">${esc(p)}</span>`).join('');
          return `<tr>
            <td class="mono" style="max-width:180px;overflow:hidden;text-overflow:ellipsis">${esc(id.substring(0,28))}…</td>
            <td>${esc(t.display_name||'')}</td>
            <td>${pols}</td>
            <td>${esc(exp)}</td>
            <td><button class="btn btn-danger btn-sm" data-revoke="${esc(id)}">Revoke</button></td>
          </tr>`;
        } catch { return `<tr><td class="mono" colspan="5">${esc(id)}</td></tr>`; }
      })).then(rows=>rows.join(''))}</tbody>
    </table>`;
    el.querySelectorAll('[data-revoke]').forEach(b => b.onclick = async () => {
      if (!confirm('Revoke token?')) return;
      try {
        const r = await fetch(`/v1/auth/token/${b.dataset.revoke}`, {
          method: 'DELETE', headers: { 'X-Tuck-Token': S.token }
        });
        if (!r.ok) { const d = await r.json(); throw new Error(d.error || r.status); }
        flash('success', 'Token revoked.'); render();
      } catch (e) { flash('error', e.message); }
    });
  } catch (e) { flash('error', e.message); }
}

async function loadPolicies() {
  try {
    const r = await fetch('/v1/policy/', {
      method: 'LIST',

    if (!r.ok) throw new Error(d.error || r.status);

    if (!d.keys?.length) { el.innerHTML = '<em style="color:var(--muted)">No policies.</em>'; return; }
    el.innerHTML = `<table class="table">
      <thead><tr><th>Name</th><th></th></tr></thead>
      <tbody>${d.keys.map(name=>`<tr>
        <td>${esc(name)}</td>
        <td style="width:120px">
          <button class="btn btn-ghost btn-sm" data-view-policy="${esc(name)}">View</button>
          <button class="btn btn-danger btn-sm" data-del-policy="${esc(name)}" style="margin-left:4px">Delete</button>
        </td>
      </tr>`).join('')}</tbody>
    </table>`;
    el.querySelectorAll('[data-view-policy]').forEach(b => b.onclick = async () => {
      try {

  } catch (e) { flash('error', e.message); }
}

// ─────────── Crypto bind ───────────
function bindCrypto() {
  // PKI
  on('click', '#list-pki-roles-btn', loadPKIRoles);
  on('click', '#list-pki-certs-btn', loadPKICerts);
  on('click', '#pki-view-ca-btn', async () => {

      const r = await apiRaw('GET', '/v1/pki/ca/pem');
      if (!r) return;
      const text = await r.text();
      document.getElementById('pki-ca-result').innerHTML =
        `<textarea class="form-row" style="width:100%;min-height:120px;font-size:11px;font-family:monospace" readonly>${esc(text)}</textarea>`;
    } catch (e) { document.getElementById('pki-ca-result').innerHTML = `<div class="alert alert-error">${esc(e.message)}</div>`; }
  });
  onSubmit('#pki-gen-root-form', async fd => {
    const body = { common_name: fd.get('common_name').trim() };
    if (fd.get('ttl').trim())      body.ttl      = fd.get('ttl').trim();

    const name = document.getElementById('totp-gen-name')?.value?.trim();

    if (totpAutoTimer) return;

    totpAutoTimer = setInterval(() => fetchTOTPCode(name), 5000);
  });

    } catch (e) { document.getElementById('totp-validate-result').innerHTML = `<div class="alert alert-error">${esc(e.message)}</div>`; }
  });
}

async function fetchTOTPCode(name) {
  try {
    const d = await api('GET', `/v1/totp/code/${name}`);
    const until = d.valid_until ? new Date(d.valid_until).toLocaleTimeString() : '';
    document.getElementById('totp-gen-result').innerHTML =
      `<div class="alert alert-info" style="text-align:center">
        <div style="font-size:36px;font-family:monospace;letter-spacing:8px;font-weight:700">${esc(d.code)}</div>
        ${until ? `<small style="color:var(--muted)">Valid until ${esc(until)}</small>` : ''}
      </div>`;
  } catch (e) {
    document.getElementById('totp-gen-result').innerHTML = `<div class="alert alert-error">${esc(e.message)}</div>`;
  }
}

// ─────────── Helpers: creds display ───────────
function renderCredsResult(d) {
  const rows = Object.entries(d)
    .filter(([,v]) => v !== null && v !== undefined && v !== '')
    .map(([k,v]) => `<dt>${esc(k)}</dt><dd class="mono">${esc(String(v))}</dd>`)
    .join('');
  return `<div class="alert alert-success"><strong>Credentials (shown once):</strong><dl class="kv-grid" style="margin-top:8px">${rows}</dl></div>`;
}

async function loadAllLeases() {
  const el = document.getElementById('leases-all');
  if (!el) return;
  const engines = [
    ['Database', '/v1/database/lease/'],
    ['AWS',      '/v1/aws/lease/'],
    ['GCP',      '/v1/gcp/lease/'],
    ['Azure',    '/v1/azure/lease/'],
  ];
  let html = '';
  for (const [name, path] of engines) {
    try {
      const r = await fetch(path, { method:'LIST', headers:{'X-Tuck-Token':S.token} });
      const d = await r.json();
      if (!r.ok || !d.keys?.length) {
        html += `<p style="font-size:12px;color:var(--muted);margin-bottom:8px"><strong>${esc(name)}:</strong> No active leases.</p>`;
        continue;
      }
      html += `<p style="font-weight:600;font-size:12px;margin-bottom:6px">${esc(name)}</p>`;
      html += `<table class="table" style="margin-bottom:14px">
        <thead><tr><th>Lease ID</th><th></th></tr></thead>
        <tbody>${d.keys.map(id=>`<tr>
          <td class="mono">${esc(id)}</td>
          <td style="width:80px"><button class="btn btn-danger btn-sm" onclick="revokeLease('${esc(path)}','${esc(id)}')">Revoke</button></td>
        </tr>`).join('')}</tbody>
      </table>`;
    } catch {
      html += `<p style="font-size:12px;color:var(--muted);margin-bottom:8px"><strong>${esc(name)}:</strong> Error loading.</p>`;
    }
  }
  el.innerHTML = html || '<em style="color:var(--muted)">No active leases across any engine.</em>';
}

  try { await api('POST', `/v1/transit/keys/${name}/rotate`); flash('success', `Key "${name}" rotated.`); loadTransitKeys(); }
  catch (e) { flash('error', e.message); }
}

async function loadSSHRoles() {
  const el = document.getElementById('ssh-role-list');
  if (!el) return;
  try {
    const r = await fetch('/v1/ssh/roles/', { method:'LIST', headers:{'X-Tuck-Token':S.token} });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error||r.status);
    if (!d.keys?.length) { el.innerHTML = '<em style="color:var(--muted)">No roles.</em>'; return; }
    el.innerHTML = renderKeyTable(d.keys, (name) => [
      `<button class="btn btn-danger btn-sm" onclick="delPath('/v1/ssh/roles/${esc(name)}','SSH role')">Delete</button>`
    ]);
  } catch (e) { el.innerHTML = `<div class="alert alert-error">${esc(e.message)}</div>`; }
}

async function loadTOTPKeys() {
  const el = document.getElementById('totp-key-list');
  if (!el) return;
  try {
    const r = await fetch('/v1/totp/keys/', { method:'LIST', headers:{'X-Tuck-Token':S.token} });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error||r.status);
    if (!d.keys?.length) { el.innerHTML = '<em style="color:var(--muted)">No TOTP keys.</em>'; return; }
    el.innerHTML = renderKeyTable(d.keys, (name) => [
      `<button class="btn btn-ghost btn-sm" onclick="viewTOTPKey('${esc(name)}')">View URL</button>`,
      `<button class="btn btn-danger btn-sm" onclick="delPath('/v1/totp/keys/${esc(name)}','TOTP key')" style="margin-left:4px">Delete</button>`,
    ]);

}

async function viewTOTPKey(name) {
  try {
    const d = await api('GET', `/v1/totp/keys/${name}`);
    alert(`Key: ${name}\nIssuer: ${d.issuer||''}\nAccount: ${d.account||''}\nAlgorithm: ${d.algorithm||''}\nDigits: ${d.digits||6}\nPeriod: ${d.period||30}s\n\nOTP URL:\n${d.url||''}`);
  } catch (e) { flash('error', e.message); }
}

async function delPath(path, label) {
  if (!confirm(`Delete ${label}?`)) return;
  try { await api('DELETE', path); flash('success', `${label} deleted.`); render(); }
  catch (e) { flash('error', e.message); }
}

function renderKeyTable(keys, actionsFn) {
  return `<table class="table">
    <thead><tr><th>Name</th><th style="width:100px"></th></tr></thead>
    <tbody>${keys.map(name=>`<tr>
      <td>${esc(name)}</td>
      <td>${actionsFn(name).join('')}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

// ─────────── Event helpers ───────────
function on(ev, sel, fn) {
  document.querySelectorAll(sel).forEach(el => el.addEventListener(ev, fn));
}

function onSubmit(sel, fn) {
  document.querySelectorAll(sel).forEach(form => form.addEventListener('submit', e => {
    e.preventDefault();
    fn(new FormData(form));
  }));
}

// ─────────── KV v2 handlers ───────────
function bindKVv2() {
  onSubmit('#v2-list-form', async fd => {
    const prefix = fd.get('prefix').trim();
    const el = document.getElementById('v2-list-result');
    if (!el) return;
    try {
      const path = prefix ? `/v2/secret/metadata/${prefix}` : '/v2/secret/metadata/';
      const r = await fetch(path, { method: 'LIST', headers: { 'X-Tuck-Token': S.token } });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || r.status);
      if (!d.keys?.length) { el.innerHTML = '<em style="color:var(--muted)">No secrets.</em>'; return; }
      el.innerHTML = renderKeyTable(d.keys, name => [
        `<button class="btn btn-ghost btn-sm" onclick="v2ReadQuick('${esc(name)}')">Read</button>`,
        `<button class="btn btn-ghost btn-sm" onclick="v2Meta('${esc(name)}')" style="margin-left:4px">Meta</button>`,
      ]);
    } catch (e) { el.innerHTML = `<div class="alert alert-error">${esc(e.message)}</div>`; }
  });

  onSubmit('#v2-write-form', async fd => {
    const path = fd.get('path').trim();
    const value = fd.get('value');
    const casStr = fd.get('cas').trim();
    const el = document.getElementById('v2-write-result');
    if (!el) return;
    try {
      let url = `/v2/secret/${path}`;
      if (casStr !== '') url += `?cas=${casStr}`;
      const r = await fetch(url, {
        method: 'PUT',
        headers: { 'X-Tuck-Token': S.token, 'Content-Type': 'text/plain' },
        body: value,
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || r.status);
      el.innerHTML = `<div class="alert alert-success">Written — version ${d.version}</div>`;
    } catch (e) { el.innerHTML = `<div class="alert alert-error">${esc(e.message)}</div>`; }
  });

  onSubmit('#v2-read-form', async fd => {
    const path = fd.get('path').trim();
    const ver = fd.get('version').trim() || '0';
    const el = document.getElementById('v2-read-result');
    if (!el) return;
    try {
      const r = await fetch(`/v2/secret/${path}?version=${ver}`, { headers: { 'X-Tuck-Token': S.token } });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error || r.status);
      el.innerHTML = `<dl class="kv-grid">
        <dt>Path</dt><dd>${esc(path)}</dd>
        <dt>Version</dt><dd>${d.version ?? ''}</dd>
        <dt>Value</dt><dd>${d.deleted ? '<em>deleted</em>' : esc(String(d.value ?? ''))}</dd>
      </dl>`;
    } catch (e) { el.innerHTML = `<div class="alert alert-error">${esc(e.message)}</div>`; }
  });

  onSubmit('#v2-meta-form', async fd => {
    const path = fd.get('path').trim();
    const el = document.getElementById('v2-meta-result');
    if (!el) return;
    try {
      const d = await api('GET', `/v2/secret/metadata/${path}`);
      el.innerHTML = `<dl class="kv-grid">
        <dt>Current version</dt><dd>${d.metadata?.current_version ?? ''}</dd>
        <dt>Max versions</dt><dd>${d.metadata?.max_versions ?? ''}</dd>
      </dl><pre style="font-size:11px;margin-top:8px;overflow:auto">${esc(JSON.stringify(d.metadata?.versions,null,2))}</pre>`;
    } catch (e) { el.innerHTML = `<div class="alert alert-error">${esc(e.message)}</div>`; }
  });

  onSubmit('#v2-delete-form', async fd => {
    const path = fd.get('path').trim();
    const versionsStr = fd.get('versions').trim();
    const action = document.activeElement?.value || 'soft';
    const versions = versionsStr ? versionsStr.split(',').map(s=>parseInt(s.trim())).filter(n=>!isNaN(n)) : [];
    try {
      if (action === 'soft') {
        const qs = versions.length ? `?versions=${versions.join(',')}` : '';
        await api('DELETE', `/v2/secret/${path}${qs}`);
        flash('success', `Soft-deleted "${path}".`);
      } else if (action === 'undelete') {
        await api('POST', `/v2/secret/undelete/${path}`, { versions });
        flash('success', `Undeleted "${path}" versions.`);
      } else if (action === 'destroy') {
        if (!confirm(`Permanently destroy versions of "${path}"?`)) return;
        await api('POST', `/v2/secret/destroy/${path}`, { versions });
        flash('success', `Destroyed "${path}" versions.`);
      }
    } catch (e) { flash('error', e.message); }
  });
}

async function v2ReadQuick(path) {
  try {
    const d = await api('GET', `/v2/secret/${path}`);
    const el = document.getElementById('v2-read-result');
    if (el) {

// ─────────── Response Wrapping handlers ───────────
function bindWrapping() {
  onSubmit('#wrap-form', async fd => {
    const payloadStr = fd.get('payload').trim();
    const el = document.getElementById('wrap-result');
    if (!el) return;
    let payload;
    try { payload = JSON.parse(payloadStr); } catch { el.innerHTML = '<div class="alert alert-error">Payload must be valid JSON</div>'; return; }
    try {
      const d = await api('POST', '/v1/sys/wrapping/wrap', payload);
      el.innerHTML = `<div class="alert alert-success" style="word-break:break-all">
        <strong>Wrapping Token:</strong><br><code>${esc(d.token)}</code>
        <br><small>TTL: ${d.ttl ?? ''}s &nbsp;|&nbsp; Expires: ${d.expires_at ?? ''}</small>
      </div>`;
    } catch (e) { el.innerHTML = `<div class="alert alert-error">${esc(e.message)}</div>`; }
  });

  onSubmit('#unwrap-form', async fd => {
    const token = fd.get('token').trim();
    const action = document.activeElement?.value || 'unwrap';
    const el = document.getElementById('unwrap-result');
    if (!el) return;
    try {
      if (action === 'lookup') {
        const d = await api('POST', '/v1/sys/wrapping/lookup', { token });
        el.innerHTML = `<dl class="kv-grid">
          <dt>Token</dt><dd>${esc(token)}</dd>
          <dt>TTL</dt><dd>${d.ttl ?? ''}s</dd>
          <dt>Expires</dt><dd>${esc(String(d.expires_at ?? ''))}</dd>
        </dl>`;
      } else if (action === 'unwrap') {
        const d = await api('POST', '/v1/sys/wrapping/unwrap', { token });
        el.innerHTML = `<div class="alert alert-success">Unwrapped payload:</div>
          <pre style="margin-top:8px;font-size:11px">${esc(JSON.stringify(d,null,2))}</pre>`;
      } else if (action === 'revoke') {
        if (!confirm('Revoke this wrapping token?')) return;
        await api('DELETE', '/v1/sys/wrapping/revoke', { token });
        el.innerHTML = '<div class="alert alert-success">Wrapping token revoked.</div>';
      }
    } catch (e) { el.innerHTML = `<div class="alert alert-error">${esc(e.message)}</div>`; }
  });
}

// ─────────── Mounts bind ───────────
function bindMounts() {
  on('click', '#refresh-mounts', loadMounts);

  onSubmit('#mount-form', async () => {
    const path = document.getElementById('mount-path')?.value.trim();
    const type = document.getElementById('mount-type')?.value;
    const desc = document.getElementById('mount-desc')?.value.trim();
    if (!path || !type) { flash('error', 'Path and type are required'); return; }
    try {
      await api('POST', `/v1/sys/mounts/${path}`, { type, description: desc });
      flash('success', `Mount "${path}" registered.`);
      await loadMounts();
    } catch (e) { flash('error', e.message); }
  });

  on('click', '[data-del-mount]', async e => {
    const path = e.currentTarget.dataset.delMount;
    if (!confirm(`Unmount "${path}"?`)) return;
    try {
      await api('DELETE', `/v1/sys/mounts/${path}`);
      flash('success', `Mount "${path}" removed.`);
      await loadMounts();
    } catch (e) { flash('error', e.message); }
  });

  if (S.page === 'mounts') loadMounts();
}

// ─────────── Plugins bind ───────────
function bindPlugins() {
  on('click', '#refresh-plugins', loadPlugins);
  on('change', '#plugin-type-filter', loadPlugins);

  onSubmit('#plugin-form', async () => {
    const name    = document.getElementById('plugin-name')?.value.trim();
    const type    = document.getElementById('plugin-type')?.value;
    const command = document.getElementById('plugin-command')?.value.trim();
    const sha256  = document.getElementById('plugin-sha256')?.value.trim();
    const version = document.getElementById('plugin-version')?.value.trim();
    if (!name || !command || !sha256) { flash('error', 'Name, command and sha256 required'); return; }
    try {
      await api('POST', `/v1/sys/plugins/catalog/${type}/${name}`, { command, sha256, version });
      flash('success', `Plugin "${name}" registered.`);
      await loadPlugins();
    } catch (e) { flash('error', e.message); }
  });

  on('click', '[data-del-plugin]', async e => {
    const ref = e.currentTarget.dataset.delPlugin; // "type/name"
    if (!confirm(`Delete plugin "${ref}"?`)) return;
    const [type, ...rest] = ref.split('/');
    const name = rest.join('/');
    try {
      await api('DELETE', `/v1/sys/plugins/catalog/${type}/${name}`);
      flash('success', `Plugin "${name}" deleted.`);
      await loadPlugins();
    } catch (e) { flash('error', e.message); }
  });

  if (S.page === 'plugins') loadPlugins();
}

          <div class="form-row"><label>Description</label><input id="mount-desc" placeholder="optional"></div>
        </div>
        <div class="form-actions"><button class="btn btn-primary btn-sm" type="submit">Register</button></div>
      </form>
    </div>
  </div>
  <div class="card">
    <div class="card-header">Active Mounts <button class="btn btn-ghost btn-sm" id="refresh-mounts">↻ Refresh</button></div>
    <div id="mounts-list"><div style="padding:14px;color:var(--muted)">Loading…</div></div>
  </div>
</div>`;
}

async function loadMounts() {
  const el = document.getElementById('mounts-list');
  if (!el) return;
  try {
    const d = await api('GET', '/v1/sys/mounts');
    if (!d) return;
    const mounts = d.mounts || [];
    if (!mounts.length) { el.innerHTML = '<div style="padding:14px;color:var(--muted)">No mounts found.</div>'; return; }
    el.innerHTML = `<table class="table">
      <thead><tr><th>Path</th><th>Type</th><th>Accessor</th><th>Builtin</th><th>Description</th><th></th></tr></thead>
      <tbody>${mounts.map(m=>`<tr>
        <td class="mono">${esc(m.path||'')}</td>
        <td><span class="tag">${esc(m.type||'')}</span></td>
        <td class="mono" style="font-size:10px">${esc(m.accessor||'')}</td>
        <td>${m.builtin?'✓':'–'}</td>
        <td>${esc(m.description||'')}</td>
        <td>${m.builtin?'':`<button class="btn btn-danger btn-sm" data-del-mount="${esc(m.path||'')}">Unmount</button>`}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  } catch (e) { el.innerHTML = `<div class="alert alert-error">${esc(e.message)}</div>`; }
}

// ─────────── Plugins page ───────────
function pagePlugins() {
  return `
<div class="page-header">
  <h1>Plugin Catalog</h1>
  <p>External secret engine and auth method plugins</p>
</div>
<div class="page-body">
  <div class="card" style="margin-bottom:20px">
    <div class="card-header">Register Plugin</div>
    <div class="card-body">
      <form id="plugin-form">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
          <div class="form-row"><label>Name</label><input id="plugin-name" placeholder="my-engine"></div>
          <div class="form-row"><label>Type</label>
            <select id="plugin-type">
              <option value="secret">secret</option>
              <option value="auth">auth</option>
              <option value="database">database</option>
            </select>
          </div>
          <div class="form-row"><label>Version</label><input id="plugin-version" placeholder="v1.0.0"></div>
          <div class="form-row"><label>Command</label><input id="plugin-command" placeholder="/opt/plugins/my-engine"></div>
          <div class="form-row"><label>SHA-256</label><input id="plugin-sha256" placeholder="deadbeef…"></div>
        </div>
        <div class="form-actions"><button class="btn btn-primary btn-sm" type="submit">Register</button></div>
      </form>
    </div>
  </div>
  <div class="card">
    <div class="card-header">
      Plugins
      <div style="display:flex;gap:8px">
        <select id="plugin-type-filter" style="font-size:12px;padding:3px 8px;border:1px solid var(--border);border-radius:var(--radius)">
          <option value="">All types</option>
          <option value="secret">secret</option>
          <option value="auth">auth</option>
          <option value="database">database</option>
        </select>
        <button class="btn btn-ghost btn-sm" id="refresh-plugins">↻ Refresh</button>
      </div>
    </div>
    <div id="plugins-list"><div style="padding:14px;color:var(--muted)">Loading…</div></div>
  </div>
</div>`;
}

async function loadPlugins() {
  const el = document.getElementById('plugins-list');
  if (!el) return;
  const t = (document.getElementById('plugin-type-filter')||{}).value || '';
  const path = t ? `/v1/sys/plugins/catalog/${t}/` : '/v1/sys/plugins/catalog/';
  try {
    const d = await api('LIST', path);
    if (!d) return;
    const plugins = d.plugins || [];
    if (!plugins.length) { el.innerHTML = '<div style="padding:14px;color:var(--muted)">No plugins registered.</div>'; return; }
    el.innerHTML = `<table class="table">
      <thead><tr><th>Name</th><th>Type</th><th>Version</th><th>Command</th><th>Builtin</th><th></th></tr></thead>
      <tbody>${plugins.map(p=>`<tr>
        <td>${esc(p.name||'')}</td>
        <td><span class="tag">${esc(p.type||'')}</span></td>
        <td class="mono">${esc(p.version||'–')}</td>
        <td class="mono" style="font-size:10px">${esc(p.command||'')}</td>
        <td>${p.builtin?'✓':'–'}</td>
        <td>${p.builtin?'':
          `<button class="btn btn-danger btn-sm" data-del-plugin="${esc(p.type||'')}/${esc(p.name||'')}">Delete</button>`}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  } catch (e) { el.innerHTML = `<div class="alert alert-error">${esc(e.message)}</div>`; }
}

// ─────────── Replication page ───────────
function pageReplication() {
  return `
<div class="page-header">
  <h1>Replication</h1>
  <p>WAL-based primary/secondary replication status and controls</p>
</div>
<div class="page-body">
  <div class="card-grid">
    <div class="card">
      <div class="card-header">Status <button class="btn btn-ghost btn-sm" id="refresh-repl">↻ Refresh</button></div>
      <div id="repl-status"><div style="padding:14px;color:var(--muted)">Loading…</div></div>
    </div>
    <div class="card">
      <div class="card-header">Controls</div>
      <div class="card-body">
        <div style="display:flex;flex-direction:column;gap:10px">
          <button class="btn btn-primary btn-sm" id="enable-primary">Enable Primary</button>
          <form id="enable-secondary-form" style="display:flex;gap:8px;align-items:center">
            <input id="primary-addr" placeholder="https://primary:8200" style="flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px">
            <button class="btn btn-primary btn-sm" type="submit">Enable Secondary</button>
          </form>
          <button class="btn btn-ghost btn-sm" id="disable-repl">Disable Replication</button>
        </div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-header">
      WAL Entries
      <input id="wal-after" type="number" min="0" placeholder="after seq" style="width:120px;padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px">
      <button class="btn btn-ghost btn-sm" id="load-wal">Load</button>
    </div>
    <div id="wal-entries"><div style="padding:14px;color:var(--muted)">Click Load to fetch WAL entries.</div></div>
  </div>
</div>`;
}

async function loadReplStatus() {
  const el = document.getElementById('repl-status');
  if (!el) return;
  try {
    const d = await api('GET', '/v1/sys/replication/status');
    if (!d) return;
    el.innerHTML = `<div class="card-body"><dl class="kv-grid">
      <dt>Mode</dt><dd><span class="tag">${esc(d.mode||'disabled')}</span></dd>
      <dt>Last sequence</dt><dd class="mono">${d.last_sequence||0}</dd>
      ${d.primary_addr?`<dt>Primary</dt><dd class="mono">${esc(d.primary_addr)}</dd>`:''}
      <dt>Updated</dt><dd>${d.updated_at?new Date(d.updated_at).toLocaleString():'–'}</dd>
    </dl></div>`;
  } catch (e) { el.innerHTML = `<div class="alert alert-error">${esc(e.message)}</div>`; }
}

async function loadWALEntries() {
  const el = document.getElementById('wal-entries');
  if (!el) return;
  const after = (document.getElementById('wal-after')||{}).value || '0';
  try {
    const d = await api('GET', `/v1/sys/replication/wal?after=${after}`);
    if (!d) return;
    const entries = d.entries || [];
    if (!entries.length) { el.innerHTML = '<div style="padding:14px;color:var(--muted)">No WAL entries found.</div>'; return; }
    el.innerHTML = `<table class="table">
      <thead><tr><th>Seq</th><th>Op</th><th>Key</th><th>Timestamp</th></tr></thead>
      <tbody>${entries.map(e=>`<tr>
        <td class="mono">${e.seq}</td>
        <td><span class="tag">${esc(e.operation||'')}</span></td>
        <td class="mono" style="font-size:10px">${esc(e.key||'')}</td>
        <td style="font-size:11px">${e.timestamp?new Date(e.timestamp).toLocaleString():'–'}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  } catch (e) { el.innerHTML = `<div class="alert alert-error">${esc(e.message)}</div>`; }
}

// ─────────── Poll ───────────
function startPoll() {
  stopPoll();
  refreshSeal();
  S.pollTimer = setInterval(refreshSeal, 5000);
}

// ─────────── Boot ───────────
render();
if (S.token) startPoll();
</script>
</body>
</html>
